<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Облік посилок V7.3</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body { font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:#f2f4f7; padding:12px; margin:0; }
h2 { text-align:center; margin-bottom:10px; }
input,select,button { width:100%; padding:10px; margin:5px 0; border-radius:10px; border:1px solid #ccc; font-size:16px; }
button { background:#007aff; color:white; border:none; }
button.delete { background:#ff3b30; }
button.closeTrip { background:#ff9500; }
.tableBox { background:white; padding:10px; border-radius:12px; margin-top:15px; }
table { width:100%; border-collapse:collapse; }
th { background:#007aff; color:white; padding:6px; font-size:13px; }
td { padding:6px; font-size:12px; text-align:center; border-bottom:1px solid #eee; }
.tripHeader { background:#d9ecff; padding:6px; border-radius:8px; margin-bottom:6px; font-weight:bold; cursor:pointer; }
</style>
</head>
<body>

<h2>Облік посилок V7.3</h2>

<!-- Рейс -->
<input id="tripName" placeholder="Назва рейсу">
<input id="startNumber" type="number" placeholder="Початковий номер посилки">
<button onclick="createTrip()">Створити рейс</button>
<select id="tripSelect"></select>
<button class="closeTrip" onclick="closeTrip()">Закрити рейс</button>
<button class="delete" onclick="deleteTrip()">Видалити рейс</button>

<hr>

<!-- Поля для посилки -->
<input id="parcelNumber" placeholder="Номер посилки">
<input id="fullName" placeholder="ПІБ">
<input id="phone" placeholder="Телефон">
<input id="city" list="citiesList" placeholder="Місто">
<datalist id="citiesList"></datalist>
<input id="branch" placeholder="Відділення НП">

<input id="places" type="number" placeholder="Місця">
<input id="weight" type="number" placeholder="Вага">
<input id="price" type="number" placeholder="Ціна">

<label><input type="checkbox" id="ourPayment"> Наша оплата</label>
<label><input type="checkbox" id="invoice"> Рахунок</label>

<input id="note" placeholder="Примітка">
<button onclick="addParcel()">Додати / Зберегти посилку</button>
<button onclick="exportExcel()">Експорт Excel</button>

<div id="tables"></div>

<script>
let parcels = JSON.parse(localStorage.getItem("parcels")) || [];
let trips = JSON.parse(localStorage.getItem("trips")) || [];
let closedTrips = JSON.parse(localStorage.getItem("closedTrips")) || [];
let clients = JSON.parse(localStorage.getItem("clients")) || {};
let userCities = JSON.parse(localStorage.getItem("userCities")) || [];
let parcelCounter = Number(localStorage.getItem("parcelCounter")) || 1;
let editId = null;

const tripSelect = document.getElementById("tripSelect");
const cityInput = document.getElementById("city");
const citiesList = document.getElementById("citiesList");
const baseCities = ["Київ","Харків","Одеса","Дніпро","Львів","Запоріжжя","Вінниця","Полтава","Чернігів","Черкаси","Хмельницький","Житомир","Суми","Рівне","Івано-Франківськ","Тернопіль","Луцьк","Ужгород","Кропивницький","Миколаїв"];

function save(){
    localStorage.setItem("parcels", JSON.stringify(parcels));
    localStorage.setItem("trips", JSON.stringify(trips));
    localStorage.setItem("closedTrips", JSON.stringify(closedTrips));
    localStorage.setItem("clients", JSON.stringify(clients));
    localStorage.setItem("userCities", JSON.stringify(userCities));
    localStorage.setItem("parcelCounter", parcelCounter);
}

function filterCities(query){
    citiesList.innerHTML = "";
    [...baseCities,...userCities].filter(c=>c.toLowerCase().includes(query.toLowerCase()))
        .forEach(c=>{
            let opt = document.createElement("option");
            opt.value = c;
            citiesList.appendChild(opt);
        });
}
cityInput.addEventListener("input", ()=>filterCities(cityInput.value));

function saveCity(name){
    if(name && !baseCities.includes(name) && !userCities.includes(name)){
        userCities.push(name);
        localStorage.setItem("userCities", JSON.stringify(userCities));
    }
}

function renderTrips(){
    tripSelect.innerHTML="";
    trips.forEach(t=>{
        let o=document.createElement("option");
        o.value=t;
        o.textContent=closedTrips.includes(t)? t+" (закритий)" : t;
        tripSelect.appendChild(o);
    });
    renderTables();
}

function createTrip(){
    let name=document.getElementById("tripName").value.trim();
    let start=Number(document.getElementById("startNumber").value);
    if(!name) return;
    if(!trips.includes(name)) trips.push(name);
    if(start) parcelCounter=start;
    document.getElementById("tripName").value="";
    document.getElementById("startNumber").value="";
    document.getElementById("parcelNumber").value=parcelCounter;
    save();
    renderTrips();
}

function closeTrip(){
    let trip=tripSelect.value;
    if(!trip) return;
    if(!closedTrips.includes(trip)) closedTrips.push(trip);
    save();
    renderTrips();
}

function deleteTrip(){
    let trip=tripSelect.value;
    if(!trip) return;
    if(!confirm("Видалити рейс?")) return;
    trips=trips.filter(t=>t!==trip);
    parcels=parcels.filter(p=>p.trip!==trip);
    closedTrips=closedTrips.filter(t=>t!==trip);
    save();
    renderTrips();
}

function addParcel(){
    let trip=tripSelect.value;
    if(!trip) return alert("Створіть рейс!");
    if(closedTrips.includes(trip)) return alert("Рейс закритий");

    let number=document.getElementById("parcelNumber").value || parcelCounter;
    let cityName=cityInput.value;
    saveCity(cityName);

    let parcelData={
        id: editId || Date.now(),
        trip,
        number,
        fullName: document.getElementById("fullName").value,
        phone: document.getElementById("phone").value,
        city: cityName,
        branch: document.getElementById("branch").value,
        places:Number(document.getElementById("places").value||0),
        weight:Number(document.getElementById("weight").value||0),
        price:Number(document.getElementById("price").value||0),
        ourPayment:document.getElementById("ourPayment").checked,
        invoice:document.getElementById("invoice").checked,
        note:document.getElementById("note").value
    };

    clients[parcelData.phone]=parcelData.fullName;

    if(editId){
        parcels=parcels.map(p=>p.id===editId ? parcelData : p);
        editId=null;
    }else{
        parcels.push(parcelData);
    }

    parcelCounter=Number(number)+1;
    document.getElementById("parcelNumber").value=parcelCounter;

    clearInputs();
    save();
    renderTables();
}

function clearInputs(){
    ["fullName","phone","city","branch","places","weight","price","note"].forEach(id=>document.getElementById(id).value="");
    document.getElementById("ourPayment").checked=false;
    document.getElementById("invoice").checked=false;
}

const fieldOrder=["parcelNumber","fullName","phone","city","branch","places","weight","price","note"];
fieldOrder.forEach((id,i)=>{
    document.getElementById(id).addEventListener("keydown",e=>{
        if(e.key==="Enter"){
            e.preventDefault();
            if(i<fieldOrder.length-1) document.getElementById(fieldOrder[i+1]).focus();
            else addParcel();
        }
    });
});

function renderTables(){
    let tables=document.getElementById("tables");
    tables.innerHTML="";
    trips.forEach(trip=>{
        let data=parcels.filter(p=>p.trip===trip);
        if(!data.length) return;
        let totalPrice=data.reduce((s,p)=>s+p.price,0);
        let totalWeight=data.reduce((s,p)=>s+p.weight,0);
        let box=document.createElement("div");
        box.className="tableBox";
        box.innerHTML=`
            <div class="tripHeader">${trip} | 💰 ${totalPrice} грн | 📦 ${data.length} | ⚖️ ${totalWeight} кг</div>
            <table>
                <tr>
                    <th>№</th><th>ПІБ</th><th>Тел</th><th>Місто</th><th>Вага</th><th>Ціна</th><th>Наш</th><th>Рахунок</th><th>Дії</th>
                </tr>
                ${data.map(p=>`
                    <tr>
                        <td>${p.number}</td>
                        <td>${p.fullName}</td>
                        <td>${p.phone}</td>
                        <td>${p.city}</td>
                        <td>${p.weight}</td>
                        <td>${p.price}</td>
                        <td>${p.ourPayment?"✓":""}</td>
                        <td>${p.invoice?"✓":""}</td>
                        <td>
                            <button class="delete" onclick="editParcel(${p.id})">✎</button>
                            <button class="delete" onclick="deleteParcel(${p.id})">X</button>
                        </td>
                    </tr>`).join("")}
            </table>
        `;
        tables.appendChild(box);
    });
}

function deleteParcel(id){ parcels=parcels.filter(p=>p.id!==id); save(); renderTables(); }

function editParcel(id){
    const p=parcels.find(p=>p.id===id);
    if(!p) return;
    editId=id;
    document.getElementById("parcelNumber").value=p.number;
    document.getElementById("fullName").value=p.fullName;
    document.getElementById("phone").value=p.phone;
    document.getElementById("city").value=p.city;
    document.getElementById("branch").value=p.branch;
    document.getElementById("places").value=p.places;
    document.getElementById("weight").value=p.weight;
    document.getElementById("price").value=p.price;
    document.getElementById("ourPayment").checked=p.ourPayment;
    document.getElementById("invoice").checked=p.invoice;
    document.getElementById("note").value=p.note;
}

function exportExcel(){
    let trip=tripSelect.value;
    if(!trip) return alert("Оберіть рейс");
    let data=parcels.filter(p=>p.trip===trip);
    if(!data.length) return alert("Немає даних");
    let ws=XLSX.utils.json_to_sheet(data);
    let wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,trip);
    XLSX.writeFile(wb,`Рейс_${trip}.xlsx`);
}

renderTrips();
document.getElementById("parcelNumber").value=parcelCounter;
</script>

</body>
</html>
